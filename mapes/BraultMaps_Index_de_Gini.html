<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Índex de Gini mundial</title>
<style>
* { box-sizing: border-box; }
body { font-family: Helvetica, Arial, sans-serif; background: #faf9f7; color: #1a1a1a; padding: 1rem; margin: 0; }
.wrap { max-width: 1280px; margin: 0 auto; }

.controls { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-bottom: 14px; }
.search-wrap { position: relative; flex: 1; min-width: 220px; }
.search-wrap input { width: 100%; padding: 11px 14px 11px 38px; font-size: 0.95rem; border: 1px solid #ccc; border-radius: 8px; font-family: inherit; outline: none; }
.search-wrap input:focus { border-color: #c8a23a; }
.search-icon { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); color: #999; }
#dropdown { position: absolute; top: 100%; left: 0; right: 0; background: #fff; border: 1px solid #ccc; border-radius: 8px; margin-top: 4px; max-height: 240px; overflow-y: auto; z-index: 20; display: none; box-shadow: 0 6px 20px rgba(0,0,0,0.12); }
#dropdown div { padding: 9px 14px; cursor: pointer; font-size: 0.88rem; display: flex; justify-content: space-between; }
#dropdown div:hover { background: #f0ede6; }
#dropdown .dd-gini { color: #c8923a; font-weight: 700; }

.legend { display: flex; align-items: center; gap: 10px; font-size: 0.78rem; color: #555; }
.legbar { width: 180px; height: 12px; border-radius: 6px; background: linear-gradient(90deg,#2c7bb6,#abd9e9,#ffffbf,#fdae61,#d7191c); }

.map-shell { position: relative; background: #dfe9ef; border: 1px solid #ccc; border-radius: 10px; overflow: hidden; }
#gmap { display: block; width: 100%; height: auto; }
.country { stroke: #ffffff; stroke-width: 0.3; transition: opacity 0.15s; cursor: pointer; }
.country.nodata { fill: #d8d4cc; }
.country.dim { opacity: 0.25; }
.country.sel { stroke: #1a1a1a; stroke-width: 1.5; }
.ocean { fill: #c4d7e0; }

.tooltip { position: absolute; pointer-events: none; background: rgba(26,26,26,0.92); color: #fff; padding: 7px 11px; border-radius: 6px; font-size: 0.8rem; opacity: 0; transition: opacity 0.12s; white-space: nowrap; z-index: 30; }
.tooltip strong { color: #f0d28a; }

.zoom-btns { position: absolute; top: 12px; right: 12px; display: flex; flex-direction: column; gap: 5px; }
.zoom-btns button { width: 34px; height: 34px; border: 1px solid #ccc; background: #fff; border-radius: 7px; font-size: 1.2rem; cursor: pointer; color: #333; line-height: 1; }
.zoom-btns button:hover { background: #f0ede6; }

.banner { display: none; align-items: center; gap: 12px; background: #fff; border: 1px solid #ddd; border-radius: 8px; padding: 10px 14px; margin-bottom: 12px; }
.banner.on { display: flex; }
.banner .b-name { font-weight: 700; font-size: 1rem; }
.banner .b-gini { color: #c8923a; font-weight: 700; font-size: 1.1rem; }
.banner .b-year { color: #888; font-size: 0.8rem; }
.banner .b-close { margin-left: auto; cursor: pointer; color: #999; font-size: 1.1rem; }

.stats { display: grid; grid-template-columns: repeat(3,1fr); gap: 1px; background: #ddd; border: 1px solid #ddd; border-radius: 8px; overflow: hidden; margin-top: 12px; }
.stat { background: #fff; padding: 12px 16px; }
.stat .s-lbl { font-size: 0.62rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: #999; margin-bottom: 3px; }
.stat .s-val { font-size: 1rem; font-weight: 700; }
.stat .s-val small { color: #c8923a; }

.foot { display: flex; justify-content: space-between; margin-top: 10px; font-size: 0.72rem; color: #999; flex-wrap: wrap; gap: 6px; }

@media (max-width: 640px) { .stats { grid-template-columns: 1fr; } }
</style>

const $ = id => document.getElementById(id);
const NS = 'http://www.w3.org/2000/svg';
const svg = $('gmap');
svg.setAttribute('viewBox', `0 0 ${DATA.vw} ${DATA.vh}`);

// Escala de color Gini (20..65) tipus RdYlBu invertit
function giniColor(g) {
  if (g == null) return null;
  const stops = [[20,[44,123,182]],[30,[171,217,233]],[40,[255,255,191]],[50,[253,174,97]],[65,[215,25,28]]];
  let lo = stops[0], hi = stops[stops.length-1];
  for (let i=0;i<stops.length-1;i++){ if (g>=stops[i][0] && g<=stops[i+1][0]){ lo=stops[i]; hi=stops[i+1]; break; } }
  const t = (g-lo[0])/(hi[0]-lo[0]||1);
  const c = lo[1].map((v,i)=>Math.round(v+(hi[1][i]-v)*t));
  return `rgb(${c[0]},${c[1]},${c[2]})`;
}

// Oceà
const ocean = document.createElementNS(NS,'rect');
ocean.setAttribute('class','ocean'); ocean.setAttribute('width',DATA.vw); ocean.setAttribute('height',DATA.vh);
svg.appendChild(ocean);

// Grup amb zoom/pan
const g = document.createElementNS(NS,'g');
svg.appendChild(g);

const els = {};
DATA.countries.forEach(c => {
  const p = document.createElementNS(NS,'path');
  p.setAttribute('d', c.d);
  const col = giniColor(c.g);
  if (col) p.setAttribute('fill', col);
  p.setAttribute('class', 'country' + (c.g==null?' nodata':''));
  p.dataset.iso = c.iso;
  g.appendChild(p);
  els[c.iso] = {el:p, data:c};

  p.addEventListener('mousemove', e => {
    const tip = $('tip');
    const shell = svg.parentElement.getBoundingClientRect();
    tip.style.left = (e.clientX - shell.left + 12) + 'px';
    tip.style.top = (e.clientY - shell.top + 12) + 'px';
    tip.innerHTML = c.g!=null ? `${c.n} — <strong>${c.g}</strong>` : `${c.n} — sense dades`;
    tip.style.opacity = '1';
  });
  p.addEventListener('mouseleave', () => { $('tip').style.opacity='0'; });
  p.addEventListener('click', () => selectCountry(c.iso));
});

// Zoom & pan
let scale=1, tx=0, ty=0, dragging=false, sx=0, sy=0;
function applyTransform(){ g.setAttribute('transform', `translate(${tx},${ty}) scale(${scale})`); }
svg.addEventListener('wheel', e => {
  e.preventDefault();
  const factor = e.deltaY<0 ? 1.15 : 1/1.15;
  const ns = Math.max(1, Math.min(8, scale*factor));
  scale = ns; clampPan(); applyTransform();
}, {passive:false});
svg.addEventListener('mousedown', e => { dragging=true; sx=e.clientX; sy=e.clientY; });
window.addEventListener('mousemove', e => {
  if(!dragging) return;
  tx += (e.clientX-sx)*(DATA.vw/svg.clientWidth); ty += (e.clientY-sy)*(DATA.vh/svg.clientHeight);
  sx=e.clientX; sy=e.clientY; clampPan(); applyTransform();
});
window.addEventListener('mouseup', ()=> dragging=false);
function clampPan(){
  const maxX=0, minX=DATA.vw*(1-scale), maxY=0, minY=DATA.vh*(1-scale);
  tx=Math.min(maxX,Math.max(minX,tx)); ty=Math.min(maxY,Math.max(minY,ty));
}
$('zin').onclick=()=>{ scale=Math.min(8,scale*1.4); clampPan(); applyTransform(); };
$('zout').onclick=()=>{ scale=Math.max(1,scale/1.4); clampPan(); applyTransform(); };

// Selecció
function selectCountry(iso){
  Object.values(els).forEach(o=>o.el.classList.remove('sel'));
  const o = els[iso];
  if(!o || o.data.g==null) return;
  o.el.classList.add('sel');
  $('banner').classList.add('on');
  $('b-name').textContent = o.data.n;
  $('b-gini').textContent = 'Gini ' + o.data.g;
  $('b-year').textContent = o.data.y ? '(' + o.data.y + ')' : '';
}
$('b-close').onclick=()=>{ $('banner').classList.remove('on'); Object.values(els).forEach(o=>o.el.classList.remove('sel')); };

// Cercador
const withData = DATA.countries.filter(c=>c.g!=null).sort((a,b)=>a.n.localeCompare(b.n));
const search=$('search'), dropdown=$('dropdown');
search.addEventListener('input', ()=>{
  const q=search.value.trim().toLowerCase();
  if(q.length<1){ dropdown.style.display='none'; return; }
  const hits=withData.filter(c=>c.n.toLowerCase().includes(q)).slice(0,8);
  if(!hits.length){ dropdown.style.display='none'; return; }
  dropdown.innerHTML=hits.map(c=>`<div data-iso="${c.iso}"><span>${c.n}</span><span class="dd-gini">${c.g}</span></div>`).join('');
  dropdown.style.display='block';
  dropdown.querySelectorAll('div').forEach(d=>d.onclick=()=>{ selectCountry(d.dataset.iso); search.value=''; dropdown.style.display='none'; });
});
document.addEventListener('click', e=>{ if(!e.target.closest('.search-wrap')) dropdown.style.display='none'; });

// Estadístiques
const sorted = withData.slice().sort((a,b)=>b.g-a.g);
$('st-max').innerHTML = `${sorted[0].n} <small>${sorted[0].g}</small>`;
$('st-min').innerHTML = `${sorted[sorted.length-1].n} <small>${sorted[sorted.length-1].g}</small>`;
const esp = els['ESP'];
if(esp && esp.data.g!=null) $('st-esp').innerHTML = `<small>Gini ${esp.data.g}</small>`;
</script>
<script>
function reportHeight(){
  const h = document.querySelector('.wrap').getBoundingClientRect().height + 20;
  if(window.parent !== window) window.parent.postMessage({giniHeight: Math.ceil(h)}, '*');
}
window.addEventListener('load', reportHeight);
window.addEventListener('resize', reportHeight);
setTimeout(reportHeight, 300);
setTimeout(reportHeight, 1000);
</script>
