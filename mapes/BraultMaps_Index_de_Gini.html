<style>

  .drop-item:hover { background: #f3f2ef; }
  .drop-item .match { font-weight: 700; }
  .drop-item.no-data { color: #999; font-style: italic; }
  .legend-row { display: flex; align-items: center; justify-content: flex-end; gap: 8px; margin-bottom: 8px; font-size: 0.8rem; color: #555; }
  #legbar { display: flex; height: 12px; width: 200px; border-radius: 3px; overflow: hidden; }
  /* Cursor: default al mar, pointer als països */

  .map-wrap.panning { cursor: grabbing; }
  #wmap path.country { cursor: pointer; }
  .zoom-btns { position: absolute; top: 12px; right: 12px; display: flex; flex-direction: column; gap: 4px; z-index: 10; }
  .zoom-btn { width: 30px; height: 30px; background: #fff; border: 1px solid #1a1a1a; border-radius: 5px; font-size: 18px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; color: #1a1a1a; font-family: Helvetica, Arial, sans-serif; user-select: none; }

  .filter-btn.active-red { background: #c0392b; color: #fff; border-color: #c0392b; }
  .filter-btn.active-blue { background: #2471a3; color: #fff; border-color: #2471a3; }
  #wmap { width: 100%; display: block; }
  #tip { position: absolute; display: none; background: #fff; border: 0.5px solid #ccc; border-radius: 6px; padding: 8px 12px; font-size: 0.85rem; pointer-events: none; z-index: 10; min-width: 160px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
  #tip-name { font-weight: 700; margin-bottom: 3px; }
  #tip-gini { color: #444; margin-bottom: 1px; }
  #tip-year { font-size: 0.75rem; color: #999; }
  #selected-banner { display: none; margin-bottom: 0.75rem; background: #fff; border: 1px solid #1a1a1a; border-radius: 6px; padding: 8px 14px; font-size: 0.9rem; align-items: center; justify-content: space-between; }

  #selected-banner .s-gini { color: #444; }
  #selected-banner .s-year { font-size: 0.75rem; color: #999; }

  .stats-box { margin-top: 1rem; border: 1px solid #1a1a1a; border-radius: 8px; padding: 12px 16px; background: #fff; }

let currentZoom = 1;
let selectedCode = null;
let activeFilter = null; // 'red' | 'blue' | null

// Threshold: top/bottom 20 countries
const sortedByGini = [...entries].sort((a,b)=>b.gini-a.gini);
const top20codes = new Set(sortedByGini.slice(0,20).map(e=>Object.keys(GINI).find(k=>GINI[k]===e)));
const bot20codes = new Set(sortedByGini.slice(-20).map(e=>Object.keys(GINI).find(k=>GINI[k]===e)));

// ── Zoom ──
const zoomBehaviour = d3.zoom()
  .scaleExtent([1, 12])
  .translateExtent([[-100,-50],[1060,550]])
  .on('start', () => { mapWrap.classList.add('panning'); })
  .on('end',   () => { mapWrap.classList.remove('panning'); })
  .on('zoom', (event) => {
    currentZoom = event.transform.k;
    svg.select('g#map-g').attr('transform', event.transform);
    if(pathSel) pathSel.attr('stroke-width', d => {
      const a3 = NUM2A3[String(d.id)];
      return (a3 === selectedCode ? 1.5 : 0.4) / currentZoom;
    });
    updateScaleBar(currentZoom);
  });
svg.call(zoomBehaviour);

function applyZoom(factor) {
  svg.transition().duration(300).call(zoomBehaviour.scaleBy, factor);
}
document.getElementById('zoom-in').addEventListener('click',  () => applyZoom(1.5));
document.getElementById('zoom-out').addEventListener('click', () => applyZoom(1/1.5));

  if(activeFilter === 'red')  return top20codes.has(a3) ? colorScale(GINI[a3].gini) : '#e8e6e0';
  if(activeFilter === 'blue') return bot20codes.has(a3) ? colorScale(GINI[a3].gini) : '#e8e6e0';
  return colorScale(GINI[a3].gini);
}

function applyFill() {
  if(!pathSel) return;
  pathSel.attr('fill', d => getCountryFill(NUM2A3[String(d.id)]));
}

document.getElementById('filter-red').addEventListener('click', function() {
  if(activeFilter === 'red') { activeFilter = null; this.classList.remove('active-red'); }
  else { activeFilter = 'red'; this.classList.add('active-red'); document.getElementById('filter-blue').classList.remove('active-blue'); }
  applyFill();
});
document.getElementById('filter-blue').addEventListener('click', function() {
  if(activeFilter === 'blue') { activeFilter = null; this.classList.remove('active-blue'); }
  else { activeFilter = 'blue'; this.classList.add('active-blue'); document.getElementById('filter-red').classList.remove('active-red'); }
  applyFill();
});

// ── Selecció ──
function highlightCountry(code) {
  if(!pathSel) return;
  pathSel
    .attr('stroke', d => NUM2A3[String(d.id)] === code ? '#1a1a1a' : '#fff')
    .attr('stroke-width', d => (NUM2A3[String(d.id)] === code ? 1.5 : 0.4) / currentZoom);
  if(code) pathSel.filter(d => NUM2A3[String(d.id)] === code).raise();
}

function selectCountry(code) {
  selectedCode = code;
  const info = GINI[code];
  document.getElementById('sb-name').textContent = info.name;
  document.getElementById('sb-gini').textContent = 'Gini: ' + info.gini;
  document.getElementById('sb-year').textContent = '(' + info.year + ')';
  document.getElementById('selected-banner').style.display = 'flex';
  highlightCountry(code);
}

function deselect() {
  selectedCode = null;
  document.getElementById('selected-banner').style.display = 'none';
  document.getElementById('search').value = '';
  highlightCountry(null);
}
document.getElementById('sb-close').addEventListener('click', deselect);

// ── Barra d'escala dinàmica ──
let scaleLineEl, scaleTextEl;
function updateScaleBar(k) {
  if(!scaleLineEl) return;
  const km  = Math.max(100, Math.round(2000 / k / 100) * 100);
  const px  = km * 48 / 2000;
  scaleLineEl.setAttribute('x2', px);
  scaleTextEl.setAttribute('x', px / 2);
  scaleTextEl.textContent = km.toLocaleString('ca') + ' km';
  scaleLineEl.parentNode.querySelectorAll('.tick-r')
    .forEach(t => { t.setAttribute('x1', px); t.setAttribute('x2', px); });
}

// ── Carregar mapa ──
fetch('https://raw.githubusercontent.com/vega/vega-datasets/master/data/world-110m.json')
  .then(r => r.json())
  .then(world => {
    const countries = topojson.feature(world, world.objects.countries);
    const mapG = svg.append('g').attr('id','map-g');

    pathSel = mapG.selectAll('path')
      .data(countries.features)
      .join('path')
      .attr('class', d => {
        const a3 = NUM2A3[String(d.id)];
        return (a3 && GINI[a3]) ? 'country' : 'country nodata';
      })
      .attr('d', path)
      .attr('fill', d => getCountryFill(NUM2A3[String(d.id)]))
      .attr('stroke','#fff')
      .attr('stroke-width', 0.4)
      .on('mousemove', function(event, d) {
        const a3  = NUM2A3[String(d.id)];
        const rect = document.getElementById('wmap').getBoundingClientRect();
        tip.style.left = (event.clientX - rect.left + 14) + 'px';
        tip.style.top  = (event.clientY - rect.top  - 10) + 'px';
        if(a3 && GINI[a3]) {
          const info = GINI[a3];
          document.getElementById('tip-name').textContent = info.name;
          document.getElementById('tip-gini').textContent = 'Índex de Gini: ' + info.gini;
          document.getElementById('tip-year').textContent = 'Any de les dades: ' + info.year;
          tip.style.display = 'block';
        } else if(a3) {
          // País sense dades: busca el nom a GINI (per si hi és) o a A3_NAMES
          const nom = (GINI[a3] && GINI[a3].name) || A3_NAMES[a3] || a3;
          document.getElementById('tip-name').textContent = nom;
          document.getElementById('tip-gini').textContent = 'Sense dades';
          document.getElementById('tip-year').textContent = '';
          tip.style.display = 'block';
        } else {
          tip.style.display = 'none';
        }
      })
      .on('mouseleave', () => { tip.style.display = 'none'; })
      .on('click', function(event, d) {
        event.stopPropagation();
        const a3 = NUM2A3[String(d.id)];
        if(a3 && GINI[a3]) {
          document.getElementById('search').value = GINI[a3].name;
          document.getElementById('dropdown').style.display = 'none';
          selectCountry(a3);
        } else {
          deselect();
        }
      });

    // Clic al mar → deseleccionar
    svg.on('click', function(event) {
      if(event.target === svg.node() || event.target.tagName === 'svg') deselect();
    });

    // ── Decoració SVG: nord + escala + projecció ──
    const ns   = 'http://www.w3.org/2000/svg';
    const deco = document.createElementNS(ns,'g');
    deco.setAttribute('id','deco');

    // Fletxa nord — disseny nou: doble triangle buit + lletra N
    const gN = document.createElementNS(ns,'g');
    gN.setAttribute('transform','translate(856,460)');
    // Meitat nord (plena fosca)
    const nHalf = document.createElementNS(ns,'polygon');
    nHalf.setAttribute('points','0,-16 7,4 0,0'); nHalf.setAttribute('fill','#333');
    // Meitat sud (plena clara)
    const sHalf = document.createElementNS(ns,'polygon');
    sHalf.setAttribute('points','0,-16 -7,4 0,0'); sHalf.setAttribute('fill','#aaa');
    // Cercle central
    const circ = document.createElementNS(ns,'circle');
    circ.setAttribute('cx','0'); circ.setAttribute('cy','0'); circ.setAttribute('r','3');
    circ.setAttribute('fill','#faf9f7'); circ.setAttribute('stroke','#555'); circ.setAttribute('stroke-width','1');
    // Lletra N
    const nTxt = document.createElementNS(ns,'text');
    nTxt.setAttribute('x','0'); nTxt.setAttribute('y','-20'); nTxt.setAttribute('text-anchor','middle');
    nTxt.setAttribute('font-size','10'); nTxt.setAttribute('font-family','Helvetica,Arial,sans-serif');
    nTxt.setAttribute('font-weight','700'); nTxt.setAttribute('fill','#333'); nTxt.textContent='N';
    gN.appendChild(nHalf); gN.appendChild(sHalf); gN.appendChild(circ); gN.appendChild(nTxt);
    deco.appendChild(gN);

    // Barra d'escala — alineada just a la dreta de la fletxa
    const gS = document.createElementNS(ns,'g');
    gS.setAttribute('transform','translate(872,464)');
    const sLine = document.createElementNS(ns,'line');
    sLine.setAttribute('x1','0'); sLine.setAttribute('y1','0');
    sLine.setAttribute('x2','48'); sLine.setAttribute('y2','0');
    sLine.setAttribute('stroke','#333'); sLine.setAttribute('stroke-width','2');
    const mkTick = (x, cls) => {
      const t = document.createElementNS(ns,'line');
      t.setAttribute('x1',x); t.setAttribute('y1','0'); t.setAttribute('x2',x); t.setAttribute('y2','-6');
      t.setAttribute('stroke','#333'); t.setAttribute('stroke-width','1.5');
      if(cls) t.setAttribute('class', cls);
      return t;
    };
    const sTxt = document.createElementNS(ns,'text');
    sTxt.setAttribute('x','24'); sTxt.setAttribute('y','-9');
    sTxt.setAttribute('text-anchor','middle'); sTxt.setAttribute('font-size','9');
    sTxt.setAttribute('font-family','Helvetica,Arial,sans-serif'); sTxt.setAttribute('fill','#333');
    sTxt.textContent='2.000 km';
    gS.appendChild(sLine); gS.appendChild(mkTick(0,null)); gS.appendChild(mkTick(48,'tick-r')); gS.appendChild(sTxt);
    deco.appendChild(gS);
    scaleLineEl = sLine; scaleTextEl = sTxt;

    // Nom de la projecció
    const pTxt = document.createElementNS(ns,'text');
    pTxt.setAttribute('x','10'); pTxt.setAttribute('y','493');
    pTxt.setAttribute('font-size','9'); pTxt.setAttribute('font-family','Helvetica,Arial,sans-serif');
    pTxt.setAttribute('fill','#888'); pTxt.textContent='Projecció: Equal Earth (àrees reals)';
    deco.appendChild(pTxt);

    document.getElementById('wmap').appendChild(deco);
  });

// ── Buscador ──
// Cerca: primer pels que comencen per la query, després pels que la contenen
const searchEl = document.getElementById('search');
const dropdown = document.getElementById('dropdown');

const allCountries = [
  ...Object.entries(GINI).map(([code,v]) => ({ code, name: v.name, hasData: true, gini: v.gini })),
  ...Object.entries(A3_NAMES)
    .filter(([code]) => !GINI[code])
    .map(([code,name]) => ({ code, name, hasData: false }))
].sort((a,b) => a.name.localeCompare(b.name, 'ca'));

function highlightMatch(text, q) {
  const idx = text.toLowerCase().indexOf(q.toLowerCase());
  if(idx < 0) return document.createTextNode(text);
  const span = document.createElement('span');
  span.appendChild(document.createTextNode(text.slice(0, idx)));
  const mark = document.createElement('span');
  mark.className = 'match';
  mark.textContent = text.slice(idx, idx + q.length);
  span.appendChild(mark);
  span.appendChild(document.createTextNode(text.slice(idx + q.length)));
  return span;
}

searchEl.addEventListener('input', function() {
  const q = this.value.trim();
  dropdown.innerHTML = '';
  if(!q) { dropdown.style.display = 'none'; return; }

  const ql = q.toLowerCase();
  // Primer els que comencen per q, després els que el contenen en un altre lloc
  const startsWith = allCountries.filter(c => c.name.toLowerCase().startsWith(ql));
  const contains   = allCountries.filter(c => !c.name.toLowerCase().startsWith(ql) && c.name.toLowerCase().includes(ql));
  const matches    = [...startsWith, ...contains].slice(0, 10);

  if(!matches.length) { dropdown.style.display = 'none'; return; }

  matches.forEach(c => {
    const item = document.createElement('div');
    item.className = 'drop-item' + (c.hasData ? '' : ' no-data');
    const label = document.createElement('span');
    label.appendChild(highlightMatch(c.name, q));
    const suffix = document.createTextNode(c.hasData ? ' — Gini: ' + c.gini : ' — sense dades');
    item.appendChild(label);
    item.appendChild(suffix);
    item.addEventListener('click', () => {
      searchEl.value = c.name;
      dropdown.style.display = 'none';
      if(c.hasData) selectCountry(c.code); else deselect();
    });
    dropdown.appendChild(item);
  });
  dropdown.style.display = 'block';
});

document.addEventListener('click', e => {
  if(!searchEl.contains(e.target) && !dropdown.contains(e.target)) dropdown.style.display = 'none';
});
</script>
